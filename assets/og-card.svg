<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset="0.55" stop-color="#0d0e10"/>
      <stop offset="1" stop-color="#141518"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#2a2d34" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2a2d34" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="1" stop-color="#52525b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="20" y="20" width="1160" height="590" rx="20" fill="none" stroke="#26282e" stroke-width="1.5"/>

  <!-- faint dotted grid, right side -->
  <g fill="#3a3d45" opacity="0.5">
    <circle cx="880" cy="120" r="2"/><circle cx="940" cy="120" r="2"/><circle cx="1000" cy="120" r="2"/><circle cx="1060" cy="120" r="2"/>
    <circle cx="880" cy="180" r="2"/><circle cx="940" cy="180" r="2"/><circle cx="1000" cy="180" r="2"/><circle cx="1060" cy="180" r="2"/>
    <circle cx="880" cy="240" r="2"/><circle cx="940" cy="240" r="2"/><circle cx="1000" cy="240" r="2"/><circle cx="1060" cy="240" r="2"/>
  </g>

  <!-- top label -->
  <text x="72" y="96" font-family="SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="4" fill="#71717a">// PORTFOLIO — 2026</text>

  <!-- name -->
  <text x="70" y="300" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="104" letter-spacing="-2" fill="#f5f5f5">Nahfid Nissar</text>

  <!-- role -->
  <text x="74" y="370" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="600" font-size="44" letter-spacing="-0.5" fill="#a1a1aa">AI Engineer &amp; Researcher</text>

  <!-- tagline -->
  <text x="74" y="438" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="400" font-size="29" fill="#71717a">I build the infrastructure that makes AI agents reliable in production.</text>

  <!-- bottom rule -->
  <rect x="74" y="510" width="220" height="3" rx="1.5" fill="url(#rule)"/>

  <!-- footer row -->
  <text x="74" y="566" font-family="SFMono-Regular, Menlo, monospace" font-size="24" letter-spacing="1" fill="#e5e7eb">nahfid.vercel.app</text>
  <text x="1128" y="566" text-anchor="end" font-family="SFMono-Regular, Menlo, monospace" font-size="24" letter-spacing="1" fill="#71717a">@NahfidN</text>
